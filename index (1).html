<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>vault.leo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💳</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f4f3f0;color:#1a1a1a;min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:inherit;font-size:inherit}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes checkPop{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes barGrow{from{width:0}to{width:var(--bar-w)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.anim-fade{animation:fadeUp .4s ease both}
.anim-scale{animation:scaleIn .35s ease both}
.anim-slide{animation:slideRight .35s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}
.header{background:rgba(255,255,255,.93);border-bottom:1px solid #e8e6e1;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(16px);flex-wrap:wrap;gap:8px}
.logo{font-size:20px;font-weight:700;letter-spacing:-.5px}.logo span{color:#8b7355;font-weight:400}
.nav{display:flex;gap:3px;flex-wrap:wrap}
.nav-btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:400;background:transparent;color:#888;transition:all .25s;white-space:nowrap}
.nav-btn:hover{background:#eee;color:#555}
.nav-btn:active{transform:scale(.96)}
.nav-btn.on{font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.ct{max-width:1200px;margin:0 auto;padding:20px 16px}
.card{background:#fff;border-radius:16px;padding:20px 22px;border:1px solid #ebe9e4;margin-bottom:14px;animation:fadeUp .4s ease both}
.card-t{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:#999;margin-bottom:10px}
.big{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1}
.inp{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #ddd;font-size:14px;outline:none;background:#fafaf8;transition:border .2s,box-shadow .2s}
.inp:focus{border-color:#999;box-shadow:0 0 0 3px rgba(0,0,0,.05)}
.sel{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #ddd;font-size:14px;background:#fafaf8;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none}
.lbl{font-size:11px;font-weight:600;color:#888;display:block;margin-bottom:4px}
.btn{padding:12px 28px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;color:#fff;transition:all .2s;position:relative;overflow:hidden}
.btn:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.btn:active{transform:scale(.97)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;border-bottom:2px solid #eee;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#999}
td{padding:11px 14px;border-bottom:1px solid #f4f3f0;transition:background .15s}
tr:hover td{background:#fafaf8}
.tag{display:inline-block;padding:3px 10px;border-radius:14px;font-size:10px;font-weight:600}
.bank-hdr{border-radius:18px;padding:26px 28px;margin-bottom:16px;position:relative;overflow:hidden;animation:scaleIn .4s ease both}
.bank-hdr::before{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06)}
.bank-hdr::after{content:'';position:absolute;bottom:-40px;right:50px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04)}
.toggle{width:44px;height:24px;border-radius:12px;cursor:pointer;position:relative;transition:background .25s}
.toggle-k{width:18px;height:18px;border-radius:9px;background:#fff;position:absolute;top:3px;transition:left .25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.pill{padding:6px 14px;border-radius:20px;border:1px solid #ddd;cursor:pointer;font-size:12px;font-weight:400;background:#fff;color:#666;transition:all .2s}
.pill:hover{border-color:#aaa}
.pill.on{border-color:transparent;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.success-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;padding:14px 28px;border-radius:12px;font-weight:600;font-size:14px;z-index:999;display:flex;align-items:center;gap:10px;animation:checkPop .4s ease both;box-shadow:0 8px 24px rgba(22,163,74,.3)}
.edit-hl{background:#fffbeb!important}
.bar-anim{animation:barGrow .6s ease both}
.empty-state{text-align:center;padding:40px 20px;color:#bbb}
.empty-state .icon{font-size:40px;margin-bottom:10px}
@media(max-width:768px){
.grid2,.grid3{grid-template-columns:1fr!important}
.nav-btn{padding:5px 10px;font-size:10px}
.ct{padding:14px 10px}
.card{padding:16px 14px;border-radius:14px}
.bank-hdr{padding:20px 18px}
.big{font-size:24px}
}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useMemo,useEffect,useRef,useCallback}=React;

const MO=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const OW=["LEO","MAMÁ"];
const CATS=["Transporte","Comida y Restaurantes","Ropa y Moda","Suscripciones","Telecomunicaciones","Tecnología","Salud","Hogar","Entretenimiento","Supermercado","Gimnasio","Belleza","Regalos","Intereses y Comisiones","Pagos y Abonos","Seguros","MSI","Deudas Anteriores","Transferencias","Otros"];
const CC={"Transporte":"#3b82f6","Comida y Restaurantes":"#ef4444","Ropa y Moda":"#ec4899","Suscripciones":"#8b5cf6","Telecomunicaciones":"#06b6d4","Tecnología":"#6366f1","Salud":"#10b981","Hogar":"#f97316","Entretenimiento":"#a855f7","Supermercado":"#84cc16","Gimnasio":"#14b8a6","Belleza":"#f472b6","Regalos":"#fbbf24","Intereses y Comisiones":"#dc2626","Pagos y Abonos":"#22c55e","Seguros":"#64748b","MSI":"#7c3aed","Deudas Anteriores":"#b91c1c","Transferencias":"#0ea5e9","Otros":"#94a3b8"};

// ═══ BANK CONFIG WITH BILLING LOGIC ═══
const BK={
  INVEX:{name:"INVEX (IKEA)",corte:26,pago:15,color:"#0066b2",grad:"linear-gradient(135deg,#001f3f 0%,#003d7a 100%)",text:"#e8f4fd"},
  Nu:{name:"Nu Crédito",corte:7,pago:17,color:"#820ad1",grad:"linear-gradient(135deg,#1a0033 0%,#4a0080 100%)",text:"#f0e0ff"},
  Santander:{name:"Santander",corte:3,pago:24,color:"#ec0000",grad:"linear-gradient(135deg,#2a0000 0%,#6b0000 100%)",text:"#ffe0e0"},
  Liverpool:{name:"Liverpool",corte:19,pago:19,color:"#e91e8c",grad:"linear-gradient(135deg,#2a0020 0%,#5a0040 100%)",text:"#ffe0f0"},
};
const BKS=Object.keys(BK);

// ═══ BILLING CYCLE CALCULATOR ═══
// Given a transaction date string "YYYY-MM-DD" and a bank, returns { billingMonth: "Mayo 2026", payDate: "15 de Mayo 2026" }
function getBillingCycle(dateStr, banco) {
  const d = new Date(dateStr + "T12:00:00");
  const day = d.getDate();
  let month = d.getMonth(); // 0-indexed
  let year = d.getFullYear();
  const cfg = BK[banco];
  const corte = cfg.corte;
  const pago = cfg.pago;

  // If the transaction date is AFTER the cutoff day, it goes to the NEXT billing cycle
  if (day > corte) {
    month += 1;
    if (month > 11) { month = 0; year += 1; }
  }
  // Now month/year is the billing cycle month
  // Payment date is pago day of that same month (or next month for some banks)
  // For INVEX: corte 26, pago 15 → pago is 15 of NEXT month
  // For Nu: corte 7, pago 17 → pago is 17 of SAME month
  // For Santander: corte 3, pago 24 → pago is 24 of SAME month
  // For Liverpool: corte 19, pago 19 → pago is 19 of SAME month (next month cycle)

  let payMonth = month;
  let payYear = year;

  // INVEX: corte 26, pago 15 → payment is on the 15th of the month AFTER the billing month
  if (banco === "INVEX") {
    payMonth = month + 1;
    if (payMonth > 11) { payMonth = 0; payYear = year + 1; }
  }
  // Liverpool: corte 19, pago 19 → payment is on 19th of NEXT month
  if (banco === "Liverpool") {
    payMonth = month + 1;
    if (payMonth > 11) { payMonth = 0; payYear = year + 1; }
  }

  const billingLabel = MO[month] + " " + year;
  const payLabel = pago + " de " + MO[payMonth] + " " + payYear;

  return { billingMonth: MO[month], billingYear: year, billingLabel, payLabel, payMonth: MO[payMonth], payYear };
}

const fmt=n=>{if(!n&&n!==0)return"$0.00";const a=Math.abs(n);const s=a.toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});return n<0?`-$${s}`:`$${s}`};
const uid=()=>Math.random().toString(36).slice(2,9);
const LS={get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}};

// ═══ TOAST COMPONENT ═══
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,1800);return()=>clearTimeout(t)},[]);
  return <div className="success-toast"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round"><path d="M20 6L9 17l-5-5"/></svg>{msg}</div>;
}

function App(){
  // Data: array of {id,banco,fecha,concepto,monto,titular,cat,billingMonth,billingYear,payLabel,_ts}
  const[data,setData]=useState(()=>LS.get("vl4-data",[]));
  const[nudeb,setNudeb]=useState(()=>LS.get("vl4-nudeb",[]));
  const[view,setView]=useState("dashboard");
  const[bv,setBv]=useState("INVEX");
  const[ts,setTs]=useState(()=>Math.max(0,...(LS.get("vl4-data",[]).map(r=>r._ts||0)),...(LS.get("vl4-nudeb",[]).map(r=>r._ts||0)))+1);
  const[form,setForm]=useState({fecha:"",concepto:"",monto:"",titular:"LEO",cat:"Otros",customCat:""});
  const[debForm,setDebForm]=useState({fecha:"",concepto:"",monto:"",cat:"Otros",customCat:""});
  const[isMSI,setIsMSI]=useState(false);
  const[msiN,setMsiN]=useState(3);
  const[editId,setEditId]=useState(null);
  const[editDebId,setEditDebId]=useState(null);
  const[toast,setToast]=useState(null);
  const[mob,setMob]=useState(window.innerWidth<768);
  const[viewMonth,setViewMonth]=useState("Todos"); // filter by billing month per bank

  useEffect(()=>{LS.set("vl4-data",data)},[data]);
  useEffect(()=>{LS.set("vl4-nudeb",nudeb)},[nudeb]);
  useEffect(()=>{const h=()=>setMob(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h)},[]);

  const showToast=(msg)=>{setToast(msg);};

  // Bank data
  const bd=useMemo(()=>{
    let d=data.filter(r=>r.banco===bv);
    if(viewMonth!=="Todos") d=d.filter(r=>r.billingMonth===viewMonth);
    return d;
  },[data,bv,viewMonth]);
  const bPos=useMemo(()=>bd.filter(r=>r.monto>0),[bd]);
  const bLeo=bPos.filter(r=>r.titular==="LEO").reduce((s,r)=>s+r.monto,0);
  const bMama=bPos.filter(r=>r.titular==="MAMÁ").reduce((s,r)=>s+r.monto,0);

  // All months that have data for current bank
  const bankMonths=useMemo(()=>{
    const ms=new Set(data.filter(r=>r.banco===bv).map(r=>r.billingMonth));
    return MO.filter(m=>ms.has(m));
  },[data,bv]);

  // Dashboard stats
  const ds=useMemo(()=>{
    const p=data.filter(r=>r.monto>0);
    const tL=p.filter(r=>r.titular==="LEO").reduce((s,r)=>s+r.monto,0);
    const tM=p.filter(r=>r.titular==="MAMÁ").reduce((s,r)=>s+r.monto,0);
    const byBank={};BKS.forEach(b=>{byBank[b]=p.filter(r=>r.banco===b).reduce((s,r)=>s+r.monto,0)});
    const byCat={};p.forEach(r=>{byCat[r.cat||"Otros"]=(byCat[r.cat||"Otros"]||0)+r.monto});
    return{tL,tM,total:tL+tM,byBank,byCat};
  },[data]);

  // ═══ ADD ENTRY WITH CORRECT BILLING ═══
  const addEntry=(banco)=>{
    if(!form.fecha||!form.concepto||!form.monto)return;
    const mp=parseFloat(form.monto);
    const cat=form.cat==="Otros"&&form.customCat?form.customCat:form.cat;

    if(isMSI&&msiN>1){
      // MSI: each installment goes into consecutive billing months starting from the transaction date billing cycle
      const base=getBillingCycle(form.fecha,banco);
      const startIdx=MO.indexOf(base.billingMonth);
      const ne=[];let t=ts;
      for(let i=0;i<msiN;i++){
        const mi=(startIdx+i)%12;
        const yr=base.billingYear+Math.floor((startIdx+i)/12);
        // Recalculate pay date for each month
        const cfg=BK[banco];
        let pm=mi,py=yr;
        if(banco==="INVEX"||banco==="Liverpool"){pm=mi+1;if(pm>11){pm=0;py=yr+1}}
        t++;
        ne.push({id:uid(),banco,fecha:form.fecha,concepto:`${form.concepto} (MSI ${i+1}/${msiN})`,monto:mp,titular:form.titular,cat,billingMonth:MO[mi],billingYear:yr,payLabel:`${cfg.pago} de ${MO[pm]} ${py}`,_ts:t});
      }
      setData(p=>[...p,...ne]);setTs(t);
      showToast(`${msiN} mensualidades registradas`);
    } else {
      const cycle=getBillingCycle(form.fecha,banco);
      const t=ts+1;setTs(t);
      setData(p=>[...p,{id:uid(),banco,fecha:form.fecha,concepto:form.concepto,monto:mp,titular:form.titular,cat,billingMonth:cycle.billingMonth,billingYear:cycle.billingYear,payLabel:cycle.payLabel,_ts:t}]);
      showToast("Cargo registrado");
    }
    setForm({fecha:"",concepto:"",monto:"",titular:"LEO",cat:"Otros",customCat:""});setIsMSI(false);
  };

  const addDebEntry=()=>{
    if(!debForm.fecha||!debForm.concepto||!debForm.monto)return;
    const cat=debForm.cat==="Otros"&&debForm.customCat?debForm.customCat:debForm.cat;
    const t=ts+1;setTs(t);
    setNudeb(p=>[...p,{id:uid(),fecha:debForm.fecha,concepto:debForm.concepto,monto:parseFloat(debForm.monto),cat,_ts:t}]);
    setDebForm({fecha:"",concepto:"",monto:"",cat:"Otros",customCat:""});
    showToast("Gasto registrado");
  };

  const delEntry=id=>{setData(p=>p.filter(r=>r.id!==id));showToast("Eliminado")};
  const delDeb=id=>{setNudeb(p=>p.filter(r=>r.id!==id));showToast("Eliminado")};

  const startEdit=item=>{setEditId(item.id);setForm({fecha:item.fecha,concepto:item.concepto,monto:String(item.monto),titular:item.titular,cat:item.cat||"Otros",customCat:""})};
  const cancelEdit=()=>{setEditId(null);setForm({fecha:"",concepto:"",monto:"",titular:"LEO",cat:"Otros",customCat:""})};
  const saveEdit=()=>{
    const cat=form.cat==="Otros"&&form.customCat?form.customCat:form.cat;
    // Recalculate billing cycle on edit
    const old=data.find(r=>r.id===editId);
    const cycle=getBillingCycle(form.fecha,old?.banco||bv);
    setData(p=>p.map(r=>r.id===editId?{...r,fecha:form.fecha,concepto:form.concepto,monto:parseFloat(form.monto),titular:form.titular,cat,billingMonth:cycle.billingMonth,billingYear:cycle.billingYear,payLabel:cycle.payLabel}:r));
    cancelEdit();showToast("Cambios guardados");
  };

  const startEditDeb=item=>{setEditDebId(item.id);setDebForm({fecha:item.fecha,concepto:item.concepto,monto:String(item.monto),cat:item.cat||"Otros",customCat:""})};
  const cancelEditDeb=()=>{setEditDebId(null);setDebForm({fecha:"",concepto:"",monto:"",cat:"Otros",customCat:""})};
  const saveEditDeb=()=>{const cat=debForm.cat==="Otros"&&debForm.customCat?debForm.customCat:debForm.cat;setNudeb(p=>p.map(r=>r.id===editDebId?{...r,fecha:debForm.fecha,concepto:debForm.concepto,monto:parseFloat(debForm.monto),cat}:r));cancelEditDeb();showToast("Cambios guardados")};

  // ═══ CATEGORY CHART ═══
  const CatChart=({items,delay})=>{
    const g={};items.filter(r=>r.monto>0).forEach(r=>{g[r.cat||"Otros"]=(g[r.cat||"Otros"]||0)+r.monto});
    const s=Object.entries(g).sort((a,b)=>b[1]-a[1]);if(!s.length)return null;
    const mx=s[0][1];const tot=s.reduce((a,[,v])=>a+v,0);
    return <div className="card anim-fade" style={{animationDelay:(delay||0)+"s"}}>
      <div className="card-t">Desglose por Categoría</div>
      {s.map(([c,v],i)=><div key={c} className="anim-slide" style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",animationDelay:(i*.04)+"s"}}>
        <div style={{width:10,height:10,borderRadius:4,background:CC[c]||"#999",flexShrink:0}}/>
        <div style={{flex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{fontWeight:500}}>{c}</span><span style={{color:"#999"}}>{((v/tot)*100).toFixed(1)}%</span></div>
          <div style={{height:5,borderRadius:3,background:"#f0eeea",overflow:"hidden",marginTop:3}}><div className="bar-anim" style={{"--bar-w":`${(v/mx)*100}%`,height:"100%",background:CC[c]||"#999",borderRadius:3,animationDelay:(i*.06)+"s"}}/></div>
        </div>
        <div style={{fontSize:12,fontWeight:600,minWidth:70,textAlign:"right"}}>{fmt(v)}</div>
      </div>)}
    </div>;
  };

  // ═══ BILLING INFO PREVIEW ═══
  const BillingPreview=({banco,fecha})=>{
    if(!fecha)return null;
    const c=getBillingCycle(fecha,banco);
    return <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"10px 14px",fontSize:12,marginTop:8,animation:"fadeIn .3s ease"}}>
      <span style={{color:"#16a34a",fontWeight:600}}>→</span> Este cargo se va al corte de <strong>{c.billingLabel}</strong> y se paga el <strong>{c.payLabel}</strong>
    </div>;
  };

  // ═══ REGISTER FORM ═══
  const RegForm=({banco})=><div className="card anim-fade" style={{animationDelay:".15s"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div className="card-t">{editId?"✎ Editar":"+ Registrar"} — {BK[banco].name}</div>
      {editId&&<button onClick={cancelEdit} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#dc2626",fontWeight:600}}>✕ Cancelar edición</button>}
    </div>
    <div className={mob?"":"grid3"} style={mob?{display:"flex",flexDirection:"column",gap:12}:{gap:12,marginBottom:6}}>
      <div><label className="lbl">Fecha del cargo</label><input type="date" className="inp" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})}/></div>
      <div><label className="lbl">Monto (negativo = abono)</label><input type="number" step="0.01" className="inp" placeholder="0.00" value={form.monto} onChange={e=>setForm({...form,monto:e.target.value})}/></div>
      <div><label className="lbl">Responsable</label><select className="sel" value={form.titular} onChange={e=>setForm({...form,titular:e.target.value})}>{OW.map(o=><option key={o}>{o}</option>)}</select></div>
      <div><label className="lbl">Concepto</label><input className="inp" placeholder="Descripción del cargo..." value={form.concepto} onChange={e=>setForm({...form,concepto:e.target.value})}/></div>
      <div><label className="lbl">Categoría</label><select className="sel" value={form.cat} onChange={e=>setForm({...form,cat:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
      {form.cat==="Otros"&&<div><label className="lbl">Especificar</label><input className="inp" value={form.customCat} onChange={e=>setForm({...form,customCat:e.target.value})}/></div>}
    </div>
    <BillingPreview banco={banco} fecha={form.fecha}/>
    {!editId&&<div style={{background:"#fafaf8",borderRadius:12,padding:"14px 18px",margin:"14px 0",border:"1px solid #ebe9e4"}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div className="toggle" style={{background:isMSI?BK[banco].color:"#ddd"}} onClick={()=>setIsMSI(!isMSI)}><div className="toggle-k" style={{left:isMSI?23:3}}/></div>
        <div><div style={{fontSize:14,fontWeight:600}}>Meses Sin Intereses</div><div style={{fontSize:11,color:"#999"}}>Se calcula automáticamente a qué mes va cada cargo</div></div>
      </div>
      {isMSI&&<div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:12}}>
        <div><label className="lbl">Meses</label><select className="sel" style={{width:"auto"}} value={msiN} onChange={e=>setMsiN(+e.target.value)}>{[2,3,4,5,6,9,10,12,18,24].map(n=><option key={n} value={n}>{n}</option>)}</select></div>
        {form.monto&&<div style={{background:"#fff",padding:"8px 14px",borderRadius:10,border:"1px solid #eee",fontSize:13,alignSelf:"end"}}>{msiN}× {fmt(parseFloat(form.monto)||0)} = <strong>{fmt((parseFloat(form.monto)||0)*msiN)}</strong></div>}
      </div>}
    </div>}
    <button className="btn" style={{background:BK[banco].color,marginTop:8}} onClick={editId?saveEdit:()=>addEntry(banco)}>{editId?"Guardar Cambios":isMSI?`Registrar ${msiN} MSI`:"Registrar Cargo"}</button>
  </div>;

  // ═══ TABLE ═══
  const MovTbl=({items,onDel,onEdit,showPay})=>{
    if(!items.length)return <div className="card empty-state anim-fade"><div className="icon">📭</div><div style={{fontSize:14,fontWeight:500}}>Sin movimientos</div><div style={{fontSize:12,marginTop:4}}>Registra tu primer cargo arriba</div></div>;
    return <div className="card anim-fade" style={{padding:0,overflow:"hidden",animationDelay:".2s"}}>
    <div style={{overflowX:"auto"}}><table>
      <thead><tr><th>Fecha</th><th>Concepto</th><th>Resp.</th><th>Categoría</th>{showPay&&<th>Se paga</th>}<th style={{textAlign:"right"}}>Monto</th><th style={{width:60}}></th></tr></thead>
      <tbody>{[...items].sort((a,b)=>(b._ts||0)-(a._ts||0)).map(r=><tr key={r.id} className={editId===r.id?"edit-hl":""}>
        <td style={{fontSize:12,color:"#666",whiteSpace:"nowrap"}}>{r.fecha}</td>
        <td style={{fontWeight:500,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.concepto}</td>
        <td><span className="tag" style={{background:r.titular==="LEO"?"#1a1a1a12":"#8b735512",color:r.titular==="LEO"?"#1a1a1a":"#8b7355"}}>{r.titular}</span></td>
        <td style={{fontSize:11,color:CC[r.cat]||"#999",whiteSpace:"nowrap"}}>{r.cat}</td>
        {showPay&&<td style={{fontSize:11,color:"#666",whiteSpace:"nowrap"}}>{r.payLabel}</td>}
        <td style={{textAlign:"right",fontWeight:600,color:r.monto<0?"#16a34a":"#1a1a1a",whiteSpace:"nowrap"}}>{fmt(r.monto)}</td>
        <td style={{whiteSpace:"nowrap"}}>
          <button onClick={()=>onEdit(r)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:3,transition:"transform .15s"}} onMouseEnter={e=>e.target.style.transform="scale(1.2)"} onMouseLeave={e=>e.target.style.transform="scale(1)"}>✎</button>
          <button onClick={()=>onDel(r.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:14,padding:3,marginLeft:4,transition:"transform .15s"}} onMouseEnter={e=>e.target.style.transform="scale(1.2)"} onMouseLeave={e=>e.target.style.transform="scale(1)"}>✕</button>
        </td>
      </tr>)}</tbody>
    </table></div></div>;
  };

  const SC=({title,value,sub,accent,delay})=><div className="card anim-scale" style={{animationDelay:(delay||0)+"s"}}>
    <div className="card-t">{title}</div><div className="big" style={{color:accent||"#1a1a1a"}}>{value}</div>
    {sub&&<div style={{fontSize:12,color:"#999",marginTop:5}}>{sub}</div>}
  </div>;

  return <div>
    {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    <div className="header">
      <div className="logo">vault<span>.leo</span></div>
      <div className="nav">
        {["dashboard",...BKS,"NuDeb"].map(v=>{
          const on=(view==="bank"&&bv===v)||view===v;
          const label=v==="NuDeb"?"Nu Débito":v==="dashboard"?"Dashboard":BK[v]?.name||v;
          const color=BK[v]?.color||"#1a1a1a";
          return <button key={v} className={`nav-btn${on?" on":""}`} style={on?{background:color}:{}} onClick={()=>{
            if(BKS.includes(v)){setView("bank");setBv(v);setViewMonth("Todos")}else setView(v);cancelEdit();cancelEditDeb();
          }}>{label}</button>
        })}
      </div>
    </div>
    <div className="ct">
      {/* ═══ DASHBOARD ═══ */}
      {view==="dashboard"&&<>
        <div className={mob?"":"grid3"}>
          <SC title="Total Cargos" value={fmt(ds.total)} sub={`${data.filter(r=>r.monto>0).length} movimientos`} delay={0}/>
          <SC title="Leo" value={fmt(ds.tL)} sub={`${((ds.tL/(ds.total||1))*100).toFixed(1)}%`} delay={.08}/>
          <SC title="Mamá" value={fmt(ds.tM)} sub={`${((ds.tM/(ds.total||1))*100).toFixed(1)}%`} accent="#8b7355" delay={.16}/>
        </div>
        {data.length>0?<>
          <div className="card anim-fade" style={{animationDelay:".2s"}}><div className="card-t">Próximos Pagos</div>
            <div className={mob?"":"grid2"}>
              {BKS.map((b,i)=>{const items=data.filter(r=>r.banco===b&&r.monto>0);const tot=items.reduce((s,r)=>s+r.monto,0);const leo=items.filter(r=>r.titular==="LEO").reduce((s,r)=>s+r.monto,0);const mama=items.filter(r=>r.titular==="MAMÁ").reduce((s,r)=>s+r.monto,0);const c=BK[b];
                return <div key={b} className="anim-scale" style={{background:c.grad,borderRadius:14,padding:"18px 20px",color:c.text,marginBottom:mob?10:0,animationDelay:(i*.08)+"s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,fontWeight:700}}>{c.name}</span><span style={{fontSize:10,opacity:.6}}>Corte: {c.corte} · Pago: {c.pago}</span></div>
                  <div style={{fontSize:22,fontWeight:700,marginBottom:6}}>{fmt(tot)}</div>
                  <div style={{display:"flex",gap:16,fontSize:11}}><span>Leo: {fmt(leo)}</span><span style={{opacity:.7}}>Mamá: {fmt(mama)}</span></div>
                </div>})}
            </div>
          </div>
          <div className="card anim-fade" style={{animationDelay:".3s"}}><div className="card-t">Distribución por Banco</div>
            {BKS.map((b,i)=>{const v=ds.byBank[b]||0;const pct=(v/(ds.total||1))*100;
              return <div key={b} className="anim-slide" style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",animationDelay:(i*.06)+"s"}}>
                <div style={{width:80,fontSize:12,fontWeight:500}}>{b}</div>
                <div style={{flex:1,height:8,borderRadius:4,background:"#f0eeea",overflow:"hidden"}}><div className="bar-anim" style={{"--bar-w":`${pct}%`,height:"100%",background:BK[b].color,borderRadius:4,animationDelay:(i*.1)+"s"}}/></div>
                <div style={{fontSize:12,fontWeight:600,minWidth:80,textAlign:"right"}}>{fmt(v)}</div>
              </div>})}
          </div>
          <CatChart items={data} delay={.35}/>
          <div className="card anim-fade" style={{animationDelay:".4s"}}><div className="card-t">Últimos Registros</div>
            {[...data].sort((a,b)=>(b._ts||0)-(a._ts||0)).slice(0,10).map((r,i)=><div key={r.id} className="anim-slide" style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:i<9?"1px solid #f4f3f0":"none",animationDelay:(i*.03)+"s"}}>
              <div style={{width:8,height:8,borderRadius:4,background:BK[r.banco]?.color||"#999"}}/>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.concepto}</div>
              <div style={{fontSize:10,color:"#aaa"}}>{r.banco} · {r.fecha} · <span style={{color:r.titular==="LEO"?"#555":"#8b7355"}}>{r.titular}</span> · Pago: {r.payLabel}</div></div>
              <div style={{fontSize:13,fontWeight:600,color:r.monto<0?"#16a34a":"#1a1a1a",whiteSpace:"nowrap"}}>{fmt(r.monto)}</div>
            </div>)}
          </div>
        </>:<div className="card empty-state anim-scale"><div className="icon">🚀</div><div style={{fontSize:16,fontWeight:600,color:"#666"}}>Bienvenido a vault.leo</div><div style={{fontSize:13,marginTop:6,color:"#999"}}>Selecciona un banco arriba y empieza a registrar tus cargos</div></div>}
      </>}

      {/* ═══ BANK VIEW ═══ */}
      {view==="bank"&&<>
        <div className="bank-hdr" style={{background:BK[bv].grad,color:BK[bv].text}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:2,opacity:.5,marginBottom:6}}>{BK[bv].name}</div>
          <div style={{fontSize:34,fontWeight:700,letterSpacing:"-1px",marginBottom:10}}>{fmt(bLeo+bMama)}</div>
          <div style={{display:"flex",gap:28,marginBottom:12}}>
            <div><div style={{fontSize:10,opacity:.5}}>Leo</div><div style={{fontSize:16,fontWeight:600}}>{fmt(bLeo)}</div></div>
            <div><div style={{fontSize:10,opacity:.5}}>Mamá</div><div style={{fontSize:16,fontWeight:600}}>{fmt(bMama)}</div></div>
          </div>
          <div style={{background:"rgba(255,255,255,.12)",borderRadius:10,padding:"10px 14px",fontSize:12,display:"flex",gap:16}}>
            <span>Corte: <strong>día {BK[bv].corte}</strong></span>
            <span>Pago límite: <strong>día {BK[bv].pago}</strong></span>
          </div>
        </div>
        {/* Month filter pills */}
        {bankMonths.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}} className="anim-fade">
          <button className={`pill${viewMonth==="Todos"?" on":""}`} style={viewMonth==="Todos"?{background:BK[bv].color,borderColor:"transparent"}:{}} onClick={()=>setViewMonth("Todos")}>Todos</button>
          {bankMonths.map(m=><button key={m} className={`pill${viewMonth===m?" on":""}`} style={viewMonth===m?{background:BK[bv].color,borderColor:"transparent"}:{}} onClick={()=>setViewMonth(m)}>{m}</button>)}
        </div>}
        <CatChart items={bd} delay={.1}/>
        <RegForm banco={bv}/>
        <div className="card-t anim-fade" style={{marginTop:8,animationDelay:".2s"}}>Movimientos{viewMonth!=="Todos"?` — ${viewMonth}`:""} — {BK[bv].name} ({bd.length})</div>
        <MovTbl items={bd} onDel={delEntry} onEdit={startEdit} showPay={true}/>
      </>}

      {/* ═══ NU DÉBITO ═══ */}
      {view==="NuDeb"&&<>
        <div className="bank-hdr" style={{background:BK.NuDeb?.grad||"linear-gradient(135deg,#0d001a,#1a0033)",color:"#f0e0ff"}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:2,opacity:.5,marginBottom:6}}>Nu Débito — Gastos Personales</div>
          <div style={{fontSize:34,fontWeight:700,marginBottom:4}}>{fmt(nudeb.reduce((s,r)=>s+r.monto,0))}</div>
          <div style={{fontSize:12,opacity:.6}}>{nudeb.length} movimientos</div>
        </div>
        {nudeb.length>0&&<CatChart items={nudeb.map(r=>({...r,titular:"LEO"}))} delay={.1}/>}
        <div className="card anim-fade" style={{animationDelay:".15s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div className="card-t">{editDebId?"✎ Editar":"+ Registrar"} — Nu Débito</div>
            {editDebId&&<button onClick={cancelEditDeb} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#dc2626",fontWeight:600}}>✕ Cancelar</button>}
          </div>
          <div className={mob?"":"grid3"} style={mob?{display:"flex",flexDirection:"column",gap:12}:{gap:12}}>
            <div><label className="lbl">Fecha</label><input type="date" className="inp" value={debForm.fecha} onChange={e=>setDebForm({...debForm,fecha:e.target.value})}/></div>
            <div><label className="lbl">Monto</label><input type="number" step="0.01" className="inp" placeholder="0.00" value={debForm.monto} onChange={e=>setDebForm({...debForm,monto:e.target.value})}/></div>
            <div><label className="lbl">Categoría</label><select className="sel" value={debForm.cat} onChange={e=>setDebForm({...debForm,cat:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
            <div style={mob?{}:{gridColumn:"1/-1"}}><label className="lbl">Concepto</label><input className="inp" placeholder="¿En qué gastaste?" value={debForm.concepto} onChange={e=>setDebForm({...debForm,concepto:e.target.value})}/></div>
            {debForm.cat==="Otros"&&<div><label className="lbl">Especificar</label><input className="inp" value={debForm.customCat} onChange={e=>setDebForm({...debForm,customCat:e.target.value})}/></div>}
          </div>
          <button className="btn" style={{background:"#820ad1",marginTop:14}} onClick={editDebId?saveEditDeb:addDebEntry}>{editDebId?"Guardar Cambios":"Registrar Gasto"}</button>
        </div>
        {nudeb.length>0&&<div className="card anim-fade" style={{padding:0,overflow:"hidden",animationDelay:".2s"}}><div style={{overflowX:"auto"}}><table>
          <thead><tr><th>Fecha</th><th>Concepto</th><th>Categoría</th><th style={{textAlign:"right"}}>Monto</th><th style={{width:60}}></th></tr></thead>
          <tbody>{[...nudeb].sort((a,b)=>(b._ts||0)-(a._ts||0)).map(r=><tr key={r.id} className={editDebId===r.id?"edit-hl":""}>
            <td style={{fontSize:12,color:"#666"}}>{r.fecha}</td><td style={{fontWeight:500}}>{r.concepto}</td>
            <td style={{fontSize:11,color:CC[r.cat]||"#999"}}>{r.cat}</td>
            <td style={{textAlign:"right",fontWeight:600}}>{fmt(r.monto)}</td>
            <td style={{whiteSpace:"nowrap"}}>
              <button onClick={()=>startEditDeb(r)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:3}}>✎</button>
              <button onClick={()=>delDeb(r.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:14,padding:3,marginLeft:4}}>✕</button>
            </td>
          </tr>)}</tbody>
        </table></div></div>}
      </>}
      <div style={{textAlign:"center",padding:"28px 0 14px",fontSize:11,color:"#bbb"}}>vault.leo — finanzas personales</div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
