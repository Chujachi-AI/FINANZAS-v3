<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>vault.leo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💳</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f4f3f0;color:#1a1a1a;min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,button{font-family:inherit;font-size:14px}
button{cursor:pointer}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes barGrow{from{width:0}to{width:var(--bar-w)}}
@keyframes checkPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.anim-fu{animation:fadeUp .4s ease both}
.anim-si{animation:scaleIn .35s ease both}
.anim-sd{animation:slideDown .3s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}
.header{background:rgba(255,255,255,.94);border-bottom:1px solid #e8e6e1;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(16px);flex-wrap:wrap;gap:8px}
.logo{font-size:20px;font-weight:700;letter-spacing:-.5px}.logo span{color:#8b7355;font-weight:400}
.nav{display:flex;gap:3px;flex-wrap:wrap}
.nav-btn{padding:6px 14px;border-radius:8px;border:none;font-size:11px;font-weight:400;background:transparent;color:#888;transition:all .25s;white-space:nowrap}
.nav-btn:hover{background:#eee}
.nav-btn.active{font-weight:700;color:#fff;transform:scale(1.02)}
.ct{max-width:1200px;margin:0 auto;padding:20px 16px}
.card{background:#fff;border-radius:16px;padding:20px 22px;border:1px solid #ebe9e4;margin-bottom:14px;transition:box-shadow .3s}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.04)}
.ct2{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:#999;margin-bottom:10px}
.inp{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #ddd;outline:none;background:#fafaf8;transition:border .2s}
.inp:focus{border-color:#8b7355}
.sel{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #ddd;background:#fafaf8;outline:none;transition:border .2s}
.sel:focus{border-color:#8b7355}
.lbl{font-size:11px;font-weight:600;color:#888;display:block;margin-bottom:4px}
.btn{padding:11px 28px;border-radius:10px;border:none;font-weight:600;color:#fff;transition:all .2s;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.btn:active{transform:scale(.97)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 12px;border-bottom:2px solid #eee;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#999}
td{padding:10px 12px;border-bottom:1px solid #f4f3f0;transition:background .15s}
tr:hover td{background:#fafaf8}
.tag{display:inline-block;padding:2px 9px;border-radius:12px;font-size:10px;font-weight:600}
.bh{border-radius:16px;padding:24px 28px;margin-bottom:16px;position:relative;overflow:hidden}
.bh::before{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06)}
.bh::after{content:'';position:absolute;bottom:-40px;left:30%;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.03)}
.toggle{width:42px;height:24px;border-radius:12px;position:relative;transition:background .2s;flex-shrink:0}
.toggle-k{width:18px;height:18px;border-radius:9px;background:#fff;position:absolute;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toast{position:fixed;top:20px;right:20px;background:#16a34a;color:#fff;padding:14px 24px;border-radius:12px;font-weight:600;font-size:14px;z-index:999;animation:slideDown .3s ease,fadeUp .3s ease 2s reverse forwards;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.toast svg{animation:checkPop .4s ease both}
.month-pill{padding:8px 0;border-radius:10px;text-align:center;cursor:pointer;transition:all .2s;border:1px solid transparent;font-size:12px}
.month-pill:hover{background:#f0eeea}
.month-pill.active{background:#1a1a1a;color:#fff;font-weight:600;border-color:#1a1a1a}
.month-pill.has-data{border-color:#ddd;font-weight:500}
.donut-ring{fill:none;stroke-width:3;opacity:.15}
.donut-seg{fill:none;stroke-width:3;stroke-linecap:round;transition:stroke-dasharray .8s ease}
@media(max-width:768px){.grid2,.grid3,.grid4{grid-template-columns:1fr}.ct{padding:14px 10px}.card{padding:16px 14px}.bh{padding:20px 18px}.nav-btn{padding:5px 10px;font-size:10px}}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useMemo,useEffect,useRef,useCallback}=React;
const MO=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const OW=["LEO","MAMÁ"];
const CATS=["Transporte","Comida y Restaurantes","Ropa y Moda","Suscripciones","Telecomunicaciones","Tecnología","Salud","Hogar","Entretenimiento","Supermercado","Gimnasio","Belleza","Regalos","Intereses y Comisiones","Pagos y Abonos","Seguros","MSI","Deudas Anteriores","Transferencias","Otros"];
const CC={"Transporte":"#3b82f6","Comida y Restaurantes":"#ef4444","Ropa y Moda":"#ec4899","Suscripciones":"#8b5cf6","Telecomunicaciones":"#06b6d4","Tecnología":"#6366f1","Salud":"#10b981","Hogar":"#f97316","Entretenimiento":"#a855f7","Supermercado":"#84cc16","Gimnasio":"#14b8a6","Belleza":"#f472b6","Regalos":"#fbbf24","Intereses y Comisiones":"#dc2626","Pagos y Abonos":"#22c55e","Seguros":"#64748b","MSI":"#7c3aed","Deudas Anteriores":"#b91c1c","Transferencias":"#0ea5e9","Otros":"#94a3b8"};
const BK={
  INVEX:{name:"INVEX (IKEA)",corte:26,pago:15,color:"#0066b2",grad:"linear-gradient(135deg,#001f3f,#004080)",text:"#e8f4fd"},
  Nu:{name:"Nu Crédito",corte:7,pago:17,color:"#820ad1",grad:"linear-gradient(135deg,#1a0033,#4a0080)",text:"#f0e0ff"},
  Santander:{name:"Santander",corte:3,pago:24,color:"#ec0000",grad:"linear-gradient(135deg,#2a0000,#5a0000)",text:"#ffe0e0"},
  Liverpool:{name:"Liverpool",corte:19,pago:19,color:"#e91e8c",grad:"linear-gradient(135deg,#2a0020,#5a0040)",text:"#ffe0f0"},
  NuDeb:{name:"Nu Débito",corte:0,pago:0,color:"#820ad1",grad:"linear-gradient(135deg,#0d001a,#2a0044)",text:"#f0e0ff"},
};
const BKS=["INVEX","Nu","Santander","Liverpool"];
const fmt=n=>{if(!n&&n!==0)return"$0.00";const a=Math.abs(n);const s=a.toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});return n<0?`-$${s}`:`$${s}`};
const uid=()=>Math.random().toString(36).slice(2,9);

// ═══ BILLING CYCLE LOGIC ═══
// Given a transaction date, determine which billing month it falls into
// Returns {mes, año, pagoDate} for a given bank
function getBillingPeriod(fechaStr, banco) {
  const d = new Date(fechaStr + "T12:00:00");
  const day = d.getDate();
  let m = d.getMonth(); // 0-indexed
  let y = d.getFullYear();
  const corte = BK[banco].corte;
  const pago = BK[banco].pago;

  // If the transaction is AFTER the cutoff date, it goes to the NEXT billing period
  if (day > corte) {
    m += 1;
    if (m > 11) { m = 0; y += 1; }
  }
  // The payment month is the month after the billing month
  let pagoM = m + 1;
  let pagoY = y;
  if (pagoM > 11) { pagoM = 0; pagoY += 1; }

  return {
    mesCorte: MO[m],
    añoCorte: y,
    mesPago: MO[pagoM],
    añoPago: pagoY,
    pagoDate: `${pago} de ${MO[pagoM]} ${pagoY}`
  };
}

// ═══ STORAGE ═══
const LS={
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){console.error(e)}},
};

// ═══ TOAST ═══
function Toast({show}){
  if(!show)return null;
  return <div className="toast"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round"><path d="M5 12l5 5L20 7"/></svg>Registrado</div>;
}

// ═══ DONUT CHART ═══
function Donut({data,size=140}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return null;
  const r=size/2-10;const circ=2*Math.PI*r;
  let offset=0;
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:"rotate(-90deg)"}}>
    <circle cx={size/2} cy={size/2} r={r} className="donut-ring" stroke="#e0e0e0"/>
    {data.map((d,i)=>{const pct=d.value/total;const dash=pct*circ;const gap=circ-dash;const o=offset;offset+=dash;
      return <circle key={i} cx={size/2} cy={size/2} r={r} className="donut-seg" stroke={d.color} strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-o}/>})}
  </svg>;
}

function App(){
  // Use versioned key — change to reset data
  const VER="v5";
  const[data,setData]=useState(()=>LS.get("vl-d-"+VER,[]));
  const[nudeb,setNudeb]=useState(()=>LS.get("vl-n-"+VER,[]));
  const[view,setView]=useState("dashboard");
  const[bv,setBv]=useState("INVEX");
  const[ts,setTs]=useState(200);
  const[toast,setToast]=useState(false);
  const[form,setForm]=useState({fecha:"",concepto:"",monto:"",titular:"LEO",cat:"Otros",customCat:""});
  const[debForm,setDebForm]=useState({fecha:"",concepto:"",monto:"",cat:"Otros",customCat:""});
  const[isMSI,setIsMSI]=useState(false);
  const[msiN,setMsiN]=useState(3);
  const[editId,setEditId]=useState(null);
  const[editDebId,setEditDebId]=useState(null);
  const[selMonth,setSelMonth]=useState(null); // selected month filter per bank
  const[mob,setMob]=useState(typeof window!=='undefined'&&window.innerWidth<768);


  useEffect(()=>{LS.set("vl-d-"+VER,data)},[data]);
  useEffect(()=>{LS.set("vl-n-"+VER,nudeb)},[nudeb]);
  useEffect(()=>{const h=()=>setMob(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h)},[]);
  useEffect(()=>{setSelMonth(null)},[view,bv]);

  const showToast=()=>{setToast(true);setTimeout(()=>setToast(false),2500)};

  // ═══ SMART ADD ═══
  const addEntry=(banco)=>{
    if(!form.fecha||!form.concepto||!form.monto)return;
    const mp=parseFloat(form.monto);
    const cat=form.cat==="Otros"&&form.customCat?form.customCat:form.cat;
    const bp=getBillingPeriod(form.fecha,banco);

    if(isMSI&&msiN>1){
      const startMIdx=MO.indexOf(bp.mesCorte);
      const ne=[];let t=ts;
      for(let i=0;i<msiN;i++){
        const mi=(startMIdx+i)%12;
        const yo=Math.floor((startMIdx+i)/12);
        t++;
        const mCorte=MO[mi];
        const aPago=bp.añoCorte+yo;
        let mPagoIdx=mi+1;let aPagoFinal=aPago;
        if(mPagoIdx>11){mPagoIdx=0;aPagoFinal++}
        ne.push({id:uid(),banco,mesCorte:mCorte,añoCorte:aPago,mesPago:MO[mPagoIdx],añoPago:aPagoFinal,titular:form.titular,fecha:form.fecha,concepto:`${form.concepto} (MSI ${i+1}/${msiN})`,monto:mp,cat,_ts:t});
      }
      setData(p=>[...p,...ne]);setTs(t);
    }else{
      const t=ts+1;setTs(t);
      setData(p=>[...p,{id:uid(),banco,mesCorte:bp.mesCorte,añoCorte:bp.añoCorte,mesPago:bp.mesPago,añoPago:bp.añoPago,titular:form.titular,fecha:form.fecha,concepto:form.concepto,monto:mp,cat,_ts:t}]);
    }
    setForm({fecha:"",concepto:"",monto:"",titular:"LEO",cat:"Otros",customCat:""});
    setIsMSI(false);showToast();
  };

  const addDebEntry=()=>{
    if(!debForm.fecha||!debForm.concepto||!debForm.monto)return;
    const cat=debForm.cat==="Otros"&&debForm.customCat?debForm.customCat:debForm.cat;
    const t=ts+1;setTs(t);
    setNudeb(p=>[...p,{id:uid(),fecha:debForm.fecha,concepto:debForm.concepto,monto:parseFloat(debForm.monto),cat,_ts:t}]);
    setDebForm({fecha:"",concepto:"",monto:"",cat:"Otros",customCat:""});showToast();
  };

  const delEntry=id=>setData(p=>p.filter(r=>r.id!==id));
  const delDeb=id=>setNudeb(p=>p.filter(r=>r.id!==id));
  const startEdit=item=>{setEditId(item.id);setForm({fecha:item.fecha,concepto:item.concepto,monto:String(item.monto),titular:item.titular,cat:item.cat||"Otros",customCat:""})};
  const cancelEdit=()=>{setEditId(null);setForm({fecha:"",concepto:"",monto:"",titular:"LEO",cat:"Otros",customCat:""})};
  const saveEdit=()=>{
    const cat=form.cat==="Otros"&&form.customCat?form.customCat:form.cat;
    const old=data.find(r=>r.id===editId);
    const bp=getBillingPeriod(form.fecha,old?.banco||bv);
    setData(p=>p.map(r=>r.id===editId?{...r,fecha:form.fecha,concepto:form.concepto,monto:parseFloat(form.monto),titular:form.titular,cat,mesCorte:bp.mesCorte,añoCorte:bp.añoCorte,mesPago:bp.mesPago,añoPago:bp.añoPago}:r));
    cancelEdit();showToast();
  };
  const startEditDeb=item=>{setEditDebId(item.id);setDebForm({fecha:item.fecha,concepto:item.concepto,monto:String(item.monto),cat:item.cat||"Otros",customCat:""})};
  const cancelEditDeb=()=>{setEditDebId(null);setDebForm({fecha:"",concepto:"",monto:"",cat:"Otros",customCat:""})};
  const saveEditDeb=()=>{const cat=debForm.cat==="Otros"&&debForm.customCat?debForm.customCat:debForm.cat;setNudeb(p=>p.map(r=>r.id===editDebId?{...r,fecha:debForm.fecha,concepto:debForm.concepto,monto:parseFloat(debForm.monto),cat}:r));cancelEditDeb();showToast()};

  // ═══ COMPUTED ═══
  const bankAll=useMemo(()=>data.filter(r=>r.banco===bv),[data,bv]);
  const bankFiltered=useMemo(()=>selMonth?bankAll.filter(r=>r.mesPago===selMonth):bankAll,[bankAll,selMonth]);
  const bankPos=useMemo(()=>bankFiltered.filter(r=>r.monto>0),[bankFiltered]);
  const bLeo=bankPos.filter(r=>r.titular==="LEO").reduce((s,r)=>s+r.monto,0);
  const bMama=bankPos.filter(r=>r.titular==="MAMÁ").reduce((s,r)=>s+r.monto,0);

  // Months that have data for this bank
  const bankMonths=useMemo(()=>{
    const m={};bankAll.forEach(r=>{const k=r.mesPago;if(!m[k])m[k]={total:0,leo:0,mama:0,count:0};if(r.monto>0){m[k].total+=r.monto;if(r.titular==="LEO")m[k].leo+=r.monto;else m[k].mama+=r.monto}m[k].count++});
    return m;
  },[bankAll]);

  // Dashboard
  const ds=useMemo(()=>{
    const p=data.filter(r=>r.monto>0);
    const tL=p.filter(r=>r.titular==="LEO").reduce((s,r)=>s+r.monto,0);
    const tM=p.filter(r=>r.titular==="MAMÁ").reduce((s,r)=>s+r.monto,0);
    const byCat={};p.forEach(r=>{byCat[r.cat||"Otros"]=(byCat[r.cat||"Otros"]||0)+r.monto});
    const byBank={};BKS.forEach(b=>{byBank[b]=p.filter(r=>r.banco===b).reduce((s,r)=>s+r.monto,0)});
    const byMonth={};p.forEach(r=>{const k=r.mesPago||"Sin mes";byMonth[k]=(byMonth[k]||0)+r.monto});
    const byOwnerCat={LEO:{},MAMÁ:{}};p.forEach(r=>{byOwnerCat[r.titular][r.cat||"Otros"]=(byOwnerCat[r.titular][r.cat||"Otros"]||0)+r.monto});
    return{tL,tM,total:tL+tM,byCat,byBank,byMonth,byOwnerCat};
  },[data]);

  // ═══ COMPONENTS ═══
  const CatChart=({items,title})=>{
    const g={};items.filter(r=>r.monto>0).forEach(r=>{g[r.cat||"Otros"]=(g[r.cat||"Otros"]||0)+r.monto});
    const s=Object.entries(g).sort((a,b)=>b[1]-a[1]);const mx=s[0]?.[1]||1;const tot=s.reduce((a,[,v])=>a+v,0);
    if(!s.length)return null;
    return <div className="card anim-fu"><div className="ct2">{title||"Desglose por Categoría"}</div>
      {s.map(([c,v],i)=><div key={c} className="anim-fu" style={{animationDelay:`${i*.04}s`,display:"flex",alignItems:"center",gap:10,padding:"6px 0"}}>
        <div style={{width:8,height:8,borderRadius:3,background:CC[c]||"#999",flexShrink:0}}/>
        <div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{fontWeight:500}}>{c}</span><span style={{color:"#999"}}>{((v/tot)*100).toFixed(1)}%</span></div>
        <div style={{height:5,borderRadius:3,background:"#f0eeea",overflow:"hidden",marginTop:3}}><div style={{height:"100%",borderRadius:3,background:CC[c]||"#999",animation:"barGrow .6s ease both",animationDelay:`${i*.06}s`,"--bar-w":`${(v/mx)*100}%`,width:`${(v/mx)*100}%`}}/></div></div>
        <div style={{fontSize:12,fontWeight:600,minWidth:70,textAlign:"right"}}>{fmt(v)}</div>
      </div>)}
    </div>;
  };

  const RegForm=({banco})=><div className="card">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div className="ct2">{editId?"✎ Editar Movimiento":"+ Registrar Movimiento"}</div>
      {editId&&<button onClick={cancelEdit} style={{background:"none",border:"none",color:"#999",fontSize:12}}>✕ Cancelar</button>}
    </div>
    <div className={mob?"":"grid3"} style={mob?{display:"flex",flexDirection:"column",gap:10}:{gap:10,marginBottom:14}}>
      <div><label className="lbl">Fecha del cargo</label><input type="date" className="inp" value={form.fecha} onChange={e=>setForm(f=>({...f,fecha:e.target.value}))}/></div>
      <div><label className="lbl">Monto (- = abono)</label><input type="number" step="0.01" className="inp" placeholder="0.00" value={form.monto} onChange={e=>setForm(f=>({...f,monto:e.target.value}))}/></div>
      <div><label className="lbl">Titular</label><select className="sel" value={form.titular} onChange={e=>setForm(f=>({...f,titular:e.target.value}))}>{OW.map(o=><option key={o}>{o}</option>)}</select></div>
      <div><label className="lbl">Concepto</label><input className="inp" placeholder="Descripción del cargo..." value={form.concepto} onChange={e=>setForm(f=>({...f,concepto:e.target.value}))}/></div>
      <div><label className="lbl">Categoría</label><select className="sel" value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
      {form.cat==="Otros"&&<div><label className="lbl">Especificar</label><input className="inp" value={form.customCat} onChange={e=>setForm(f=>({...f,customCat:e.target.value}))}/></div>}
    </div>
    {form.fecha&&!editId&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"10px 14px",margin:"10px 0",fontSize:12,color:"#16a34a"}}>
      Este cargo se asigna al corte de <strong>{getBillingPeriod(form.fecha,banco).mesCorte}</strong> → pago: <strong>{getBillingPeriod(form.fecha,banco).pagoDate}</strong>
    </div>}
    {!editId&&<div style={{background:"#fafaf8",borderRadius:10,padding:"12px 16px",margin:"10px 0",border:"1px solid #ebe9e4"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:isMSI?10:0}}>
        <div className="toggle" style={{background:isMSI?BK[banco].color:"#ddd"}} onClick={()=>setIsMSI(!isMSI)}><div className="toggle-k" style={{left:isMSI?21:3}}/></div>
        <span style={{fontSize:13,fontWeight:600}}>Meses Sin Intereses</span></div>
      {isMSI&&<div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:6}}>
        <div><label className="lbl">Meses</label><select className="sel" style={{width:"auto"}} value={msiN} onChange={e=>setMsiN(+e.target.value)}>{[2,3,4,5,6,9,10,12,18,24].map(n=><option key={n} value={n}>{n}</option>)}</select></div>
        {form.monto&&<div style={{background:"#fff",padding:"8px 14px",borderRadius:8,border:"1px solid #eee",fontSize:13,alignSelf:"end"}}>{msiN}× {fmt(parseFloat(form.monto)||0)} = <strong>{fmt((parseFloat(form.monto)||0)*msiN)}</strong></div>}
      </div>}
    </div>}
    <button className="btn" style={{background:BK[banco].color,marginTop:8}} onClick={editId?saveEdit:()=>addEntry(banco)}>{editId?"Guardar Cambios":isMSI?`Agregar ${msiN} MSI`:"Agregar Movimiento"}</button>
  </div>;

  const MovTbl=({items,onDel,onEdit})=>{
    const sorted=[...items].sort((a,b)=>(b._ts||0)-(a._ts||0));
    if(!sorted.length)return <div className="card anim-fu" style={{textAlign:"center",color:"#999",padding:40}}>Sin movimientos registrados</div>;
    return <div className="card anim-fu" style={{padding:0,overflow:"hidden"}}><div style={{overflowX:"auto"}}><table>
      <thead><tr><th>Fecha</th><th>Concepto</th><th>Titular</th><th>Cat.</th><th>Pago</th><th style={{textAlign:"right"}}>Monto</th><th style={{width:60}}></th></tr></thead>
      <tbody>{sorted.map(r=><tr key={r.id} style={editId===r.id?{background:"#fffbeb"}:{}}>
        <td style={{fontSize:11,color:"#666"}}>{r.fecha}</td>
        <td style={{fontWeight:500,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.concepto}</td>
        <td><span className="tag" style={{background:r.titular==="LEO"?"#1a1a1a12":"#8b735512",color:r.titular==="LEO"?"#1a1a1a":"#8b7355"}}>{r.titular}</span></td>
        <td style={{fontSize:10,color:CC[r.cat]||"#999"}}>{r.cat}</td>
        <td style={{fontSize:10,color:"#999"}}>{r.mesPago}</td>
        <td style={{textAlign:"right",fontWeight:600,color:r.monto<0?"#16a34a":"#1a1a1a"}}>{fmt(r.monto)}</td>
        <td style={{whiteSpace:"nowrap"}}><button onClick={()=>onEdit(r)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:2,marginRight:2}}>✎</button><button onClick={()=>onDel(r.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:14,padding:2}}>✕</button></td>
      </tr>)}</tbody>
    </table></div></div>;
  };

  return <div>
    <Toast show={toast}/>
    <div className="header">
      <div className="logo">vault<span>.leo</span></div>
      <div className="nav">{["dashboard",...BKS,"NuDeb"].map(v=>{
        const active=(view==="bank"&&bv===v)||view===v;
        const label=v==="NuDeb"?"Nu Débito":v==="dashboard"?"Dashboard":BK[v]?.name||v;
        const color=BK[v]?.color||"#1a1a1a";
        return <button key={v} className={`nav-btn${active?" active":""}`} style={active?{background:color}:{}} onClick={()=>{
          if(BKS.includes(v)){setView("bank");setBv(v)}else setView(v);cancelEdit();cancelEditDeb()
        }}>{label}</button>
      })}</div>
    </div>

    <div className="ct">
      {/* ═══ DASHBOARD ═══ */}
      {view==="dashboard"&&<>
        <div className={mob?"":"grid3"} style={mob?{display:"flex",flexDirection:"column",gap:12}:{marginBottom:14}}>
          <div className="card anim-si"><div className="ct2">Total Cargos</div><div className="big-num" style={{fontSize:30,fontWeight:700,letterSpacing:"-1px"}}>{fmt(ds.total)}</div><div style={{fontSize:12,color:"#999",marginTop:5}}>{data.filter(r=>r.monto>0).length} movimientos</div></div>
          <div className="card anim-si d1"><div className="ct2">Leo</div><div style={{fontSize:28,fontWeight:700,letterSpacing:"-1px"}}>{fmt(ds.tL)}</div><div style={{fontSize:12,color:"#999",marginTop:5}}>{((ds.tL/(ds.total||1))*100).toFixed(1)}%</div></div>
          <div className="card anim-si d2"><div className="ct2">Mamá</div><div style={{fontSize:28,fontWeight:700,letterSpacing:"-1px",color:"#8b7355"}}>{fmt(ds.tM)}</div><div style={{fontSize:12,color:"#999",marginTop:5}}>{((ds.tM/(ds.total||1))*100).toFixed(1)}%</div></div>
        </div>

        {data.length===0&&<div className="card anim-fu" style={{textAlign:"center",padding:"50px 20px"}}>
          <div style={{fontSize:40,marginBottom:12}}>📊</div>
          <div style={{fontSize:18,fontWeight:600,marginBottom:6}}>¡Bienvenido a vault.leo!</div>
          <div style={{color:"#999",fontSize:14}}>Selecciona un banco en la navegación para empezar a registrar tus movimientos</div>
        </div>}

        {data.length>0&&<>
          {/* Payment calendar */}
          <div className="card anim-fu d1"><div className="ct2">Próximos Pagos</div>
            <div className={mob?"":"grid2"} style={mob?{display:"flex",flexDirection:"column",gap:10}:{gap:10}}>
              {BKS.map(b=>{const items=data.filter(r=>r.banco===b&&r.monto>0);const tot=items.reduce((s,r)=>s+r.monto,0);const leo=items.filter(r=>r.titular==="LEO").reduce((s,r)=>s+r.monto,0);const mama=items.filter(r=>r.titular==="MAMÁ").reduce((s,r)=>s+r.monto,0);
                return <div key={b} className="anim-si" style={{background:BK[b].grad,borderRadius:14,padding:"16px 18px",color:BK[b].text,transition:"transform .2s",cursor:"pointer"}} onClick={()=>{setView("bank");setBv(b)}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,fontWeight:700}}>{BK[b].name}</span><span style={{fontSize:10,opacity:.6}}>Día {BK[b].pago}</span></div>
                  <div style={{fontSize:22,fontWeight:700,marginBottom:6}}>{fmt(tot)}</div>
                  <div style={{display:"flex",gap:16,fontSize:11}}><span>Leo: {fmt(leo)}</span><span style={{opacity:.7}}>Mamá: {fmt(mama)}</span></div>
                </div>})}
            </div>
          </div>

          {/* Leo vs Mamá donut + bank bars */}
          <div className={mob?"":"grid2"} style={mob?{display:"flex",flexDirection:"column",gap:12}:{gap:12,marginBottom:14}}>
            <div className="card anim-fu d2" style={{display:"flex",alignItems:"center",gap:20,justifyContent:"center",flexWrap:"wrap"}}>
              <Donut data={[{value:ds.tL,color:"#1a1a1a"},{value:ds.tM,color:"#8b7355"}]} size={120}/>
              <div><div className="ct2">Leo vs Mamá</div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><div style={{width:12,height:12,borderRadius:3,background:"#1a1a1a"}}/><span style={{fontSize:13}}>Leo: <strong>{fmt(ds.tL)}</strong></span></div>
                <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:12,height:12,borderRadius:3,background:"#8b7355"}}/><span style={{fontSize:13}}>Mamá: <strong>{fmt(ds.tM)}</strong></span></div>
              </div>
            </div>
            <div className="card anim-fu d3"><div className="ct2">Por Banco</div>
              {BKS.map((b,i)=>{const v=ds.byBank[b]||0;const pct=(v/(ds.total||1))*100;
                return <div key={b} className="anim-fu" style={{animationDelay:`${i*.08}s`,display:"flex",alignItems:"center",gap:10,padding:"7px 0"}}>
                  <div style={{width:70,fontSize:12,fontWeight:500}}>{b}</div>
                  <div style={{flex:1,height:8,borderRadius:4,background:"#f0eeea",overflow:"hidden"}}><div style={{height:"100%",borderRadius:4,background:BK[b].color,animation:"barGrow .7s ease both",animationDelay:`${i*.1}s`,"--bar-w":`${pct}%`,width:`${pct}%`}}/></div>
                  <div style={{fontSize:12,fontWeight:600,minWidth:75,textAlign:"right"}}>{fmt(v)}</div>
                </div>})}
            </div>
          </div>

          {/* Monthly trend */}
          {Object.keys(ds.byMonth).length>0&&<div className="card anim-fu d3"><div className="ct2">Gasto por Mes de Pago</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:mob?4:10,height:140}}>
              {MO.map((m,i)=>{const v=ds.byMonth[m]||0;const max=Math.max(...Object.values(ds.byMonth),1);const h=Math.max(4,(v/max)*120);
                return <div key={m} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
                  <div style={{fontSize:9,color:"#999",marginBottom:3}}>{v>0?fmt(v):""}</div>
                  <div style={{width:"100%",maxWidth:30,height:v>0?h:4,background:v>0?"linear-gradient(to top,#1a1a1a,#555)":"#eee",borderRadius:4,animation:v>0?"barGrow .6s ease both":"none",animationDelay:`${i*.05}s`,"--bar-w":"100%",transition:"height .5s"}}/>
                  <div style={{fontSize:9,color:"#666",marginTop:4}}>{m.slice(0,3)}</div>
                </div>})}
            </div>
          </div>}

          {/* Category donut + list */}
          <div className={mob?"":"grid2"} style={mob?{display:"flex",flexDirection:"column",gap:12}:{gap:12,marginBottom:14}}>
            <div className="card anim-fu d4" style={{display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
              <div className="ct2">Top Categorías</div>
              <Donut data={Object.entries(ds.byCat).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([c,v])=>({value:v,color:CC[c]||"#999"}))} size={160}/>
              <div style={{marginTop:12,display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
                {Object.entries(ds.byCat).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([c])=><span key={c} style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:CC[c]+"20",color:CC[c]}}>{c}</span>)}
              </div>
            </div>
            <CatChart items={data} title="Todas las Categorías"/>
          </div>

          {/* Recent */}
          <div className="card anim-fu d5"><div className="ct2">Últimos Registros</div>
            {[...data].sort((a,b)=>(b._ts||0)-(a._ts||0)).slice(0,10).map((r,i)=><div key={r.id} className="anim-fu" style={{animationDelay:`${i*.04}s`,display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<9?"1px solid #f4f3f0":"none"}}>
              <div style={{width:6,height:6,borderRadius:3,background:BK[r.banco]?.color}}/>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.concepto}</div>
              <div style={{fontSize:10,color:"#aaa"}}>{r.banco} · {r.fecha} · <span style={{color:r.titular==="LEO"?"#555":"#8b7355"}}>{r.titular}</span> → pago {r.mesPago}</div></div>
              <div style={{fontSize:13,fontWeight:600,color:r.monto<0?"#16a34a":"#1a1a1a"}}>{fmt(r.monto)}</div>
            </div>)}
          </div>
        </>}
      </>}

      {/* ═══ BANK VIEW ═══ */}
      {view==="bank"&&<>
        <div className="bh anim-si" style={{background:BK[bv].grad,color:BK[bv].text}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:2,opacity:.5,marginBottom:6}}>{BK[bv].name}</div>
          <div style={{fontSize:34,fontWeight:700,letterSpacing:"-1px",marginBottom:8}}>{fmt(bLeo+bMama)}</div>
          <div style={{display:"flex",gap:24,marginBottom:10}}>
            <div><div style={{fontSize:10,opacity:.5}}>Leo</div><div style={{fontSize:16,fontWeight:600}}>{fmt(bLeo)}</div></div>
            <div><div style={{fontSize:10,opacity:.5}}>Mamá</div><div style={{fontSize:16,fontWeight:600}}>{fmt(bMama)}</div></div>
          </div>
          <div style={{background:"rgba(255,255,255,.1)",borderRadius:10,padding:"8px 14px",fontSize:12,display:"inline-block"}}>
            Corte: día {BK[bv].corte} · Pago: día {BK[bv].pago}
          </div>
        </div>

        {/* Monthly pills */}
        <div className="card anim-fu" style={{padding:"14px 16px"}}>
          <div className="ct2">Calendario de Pagos</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:6}}>
            <div className={`month-pill${!selMonth?" active":""}`} onClick={()=>setSelMonth(null)}>Todos</div>
            {MO.map(m=>{const d=bankMonths[m];return <div key={m} className={`month-pill${selMonth===m?" active":""}${d?" has-data":""}`} onClick={()=>setSelMonth(selMonth===m?null:m)}>
              <div>{m.slice(0,3)}</div>
              {d&&<div style={{fontSize:10,fontWeight:600,marginTop:2}}>{fmt(d.total)}</div>}
            </div>})}
          </div>
        </div>

        {selMonth&&bankMonths[selMonth]&&<div className="card anim-sd" style={{background:"#fafaf8"}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Pago de {selMonth}</div>
          <div style={{fontSize:12,color:"#666"}}>Fecha límite: <strong>día {BK[bv].pago} de {selMonth}</strong></div>
          <div style={{display:"flex",gap:20,marginTop:8,fontSize:13}}>
            <div>Leo: <strong>{fmt(bankMonths[selMonth].leo)}</strong></div>
            <div style={{color:"#8b7355"}}>Mamá: <strong>{fmt(bankMonths[selMonth].mama)}</strong></div>
            <div>Total: <strong>{fmt(bankMonths[selMonth].total)}</strong></div>
          </div>
        </div>}

        <CatChart items={bankFiltered}/>
        <RegForm banco={bv}/>
        <div className="ct2" style={{marginTop:8}}>Movimientos{selMonth?` — Pago ${selMonth}`:""}</div>
        <MovTbl items={bankFiltered} onDel={delEntry} onEdit={startEdit}/>
      </>}

      {/* ═══ NU DÉBITO ═══ */}
      {view==="NuDeb"&&<>
        <div className="bh anim-si" style={{background:BK.NuDeb.grad,color:BK.NuDeb.text}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:2,opacity:.5,marginBottom:6}}>Nu Débito — Gastos Personales</div>
          <div style={{fontSize:34,fontWeight:700,marginBottom:4}}>{fmt(nudeb.reduce((s,r)=>s+r.monto,0))}</div>
          <div style={{fontSize:12,opacity:.6}}>{nudeb.length} movimientos</div>
        </div>
        {nudeb.length>0&&<CatChart items={nudeb.map(r=>({...r,titular:"LEO"}))}/>}
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div className="ct2">{editDebId?"✎ Editar":"+ Registrar"} — Nu Débito</div>
            {editDebId&&<button onClick={cancelEditDeb} style={{background:"none",border:"none",color:"#999",fontSize:12}}>✕ Cancelar</button>}
          </div>
          <div className={mob?"":"grid3"} style={mob?{display:"flex",flexDirection:"column",gap:10}:{gap:10,marginBottom:14}}>
            <div><label className="lbl">Fecha</label><input type="date" className="inp" value={debForm.fecha} onChange={e=>setDebForm(f=>({...f,fecha:e.target.value}))}/></div>
            <div><label className="lbl">Monto</label><input type="number" step="0.01" className="inp" placeholder="0.00" value={debForm.monto} onChange={e=>setDebForm(f=>({...f,monto:e.target.value}))}/></div>
            <div><label className="lbl">Categoría</label><select className="sel" value={debForm.cat} onChange={e=>setDebForm(f=>({...f,cat:e.target.value}))}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
            <div style={mob?{}:{gridColumn:"1/-1"}}><label className="lbl">Concepto</label><input className="inp" placeholder="¿En qué gastaste?" value={debForm.concepto} onChange={e=>setDebForm(f=>({...f,concepto:e.target.value}))}/></div>
            {debForm.cat==="Otros"&&<div><label className="lbl">Especificar</label><input className="inp" value={debForm.customCat} onChange={e=>setDebForm(f=>({...f,customCat:e.target.value}))}/></div>}
          </div>
          <button className="btn" style={{background:"#820ad1",marginTop:8}} onClick={editDebId?saveEditDeb:addDebEntry}>{editDebId?"Guardar Cambios":"Registrar Gasto"}</button>
        </div>
        {nudeb.length>0&&<div className="card anim-fu" style={{padding:0,overflow:"hidden"}}><div style={{overflowX:"auto"}}><table>
          <thead><tr><th>Fecha</th><th>Concepto</th><th>Cat.</th><th style={{textAlign:"right"}}>Monto</th><th style={{width:60}}></th></tr></thead>
          <tbody>{[...nudeb].sort((a,b)=>(b._ts||0)-(a._ts||0)).map(r=><tr key={r.id} style={editDebId===r.id?{background:"#f3e8ff"}:{}}>
            <td style={{fontSize:11,color:"#666"}}>{r.fecha}</td><td style={{fontWeight:500}}>{r.concepto}</td>
            <td style={{fontSize:10,color:CC[r.cat]||"#999"}}>{r.cat}</td>
            <td style={{textAlign:"right",fontWeight:600}}>{fmt(r.monto)}</td>
            <td style={{whiteSpace:"nowrap"}}><button onClick={()=>startEditDeb(r)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:2,marginRight:2}}>✎</button><button onClick={()=>delDeb(r.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:14,padding:2}}>✕</button></td>
          </tr>)}</tbody>
        </table></div></div>}
      </>}

      <div style={{textAlign:"center",padding:"28px 0 14px",fontSize:11,color:"#bbb"}}>vault.leo v4</div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
